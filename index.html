<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ANSA • MUSIC</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617 70%);
      color: white;
      text-align: center;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 430px;
      margin: auto;
      padding-top: 20px;
    }

    h1 {
      font-size: 34px;
      margin-bottom: 8px;
      color: #7dd3fc;
      text-shadow: 0 0 15px rgba(125, 211, 252, 0.5);
    }

    .subtitle {
      opacity: 0.8;
      margin-bottom: 24px;
      font-size: 14px;
      letter-spacing: 1px;
      color: #cbd5e1;
    }

    .cover {
      width: 100%;
      border-radius: 24px;
      box-shadow: 0 0 30px rgba(56, 189, 248, 0.25);
      margin-bottom: 24px;
      border: 1px solid rgba(125, 211, 252, 0.15);
    }

    .player-card,
    .song-card {
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid rgba(125, 211, 252, 0.14);
      border-radius: 20px;
      padding: 20px;
      margin-top: 18px;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.08);
      backdrop-filter: blur(12px);
    }

    .now-playing {
      font-size: 12px;
      letter-spacing: 1.5px;
      color: #38bdf8;
      margin-bottom: 10px;
      opacity: 0.95;
    }

    .track-title {
      font-size: 24px;
      margin: 0 0 14px;
      color: #f8fafc;
    }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      background: linear-gradient(90deg, #38bdf8, #0ea5e9);
      color: white;
      box-shadow: 0 0 14px rgba(56, 189, 248, 0.25);
    }

    button.secondary {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(125, 211, 252, 0.18);
      color: #e2e8f0;
      box-shadow: none;
    }

    .shuffle-status {
      margin-top: 14px;
      font-size: 13px;
      color: #94a3b8;
    }

    .song-card {
      text-align: left;
    }

    .song-number {
      font-size: 12px;
      color: #38bdf8;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .song-name {
      font-size: 18px;
      color: #f1f5f9;
      margin: 0;
    }

    .song-file {
      margin-top: 8px;
      font-size: 13px;
      color: #94a3b8;
    }

    .btn {
      display: inline-block;
      margin-top: 24px;
      padding: 14px 22px;
      border-radius: 14px;
      background: linear-gradient(90deg, #38bdf8, #0ea5e9);
      color: white;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 0 18px rgba(56, 189, 248, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ANSA</h1>
    <p class="subtitle">ANSA • MUSIC</p>

    <img src="oz-zholym-cover.jpg" alt="ANSA cover" class="cover">

    <div class="player-card">
      <div class="now-playing">NOW PLAYING</div>
      <h2 class="track-title" id="trackTitle">Өз жолым</h2>

      <audio id="audioPlayer" controls>
        <source id="audioSource" src="oz-zholym.mp3" type="audio/mpeg">
        Ваш браузер не поддерживает аудио.
      </audio>

      <div class="controls">
        <button class="secondary" onclick="prevTrack()">Prev</button>
        <button onclick="playSelectedTrack(currentTrackIndex)">Play</button>
        <button class="secondary" onclick="nextTrack()">Next</button>
        <button onclick="toggleShuffle()">Shuffle</button>
      </div>

      <div class="shuffle-status" id="shuffleStatus">Shuffle: OFF</div>
    </div>

    <div class="song-card">
      <div class="song-number">TRACK 01</div>
      <p class="song-name">Өз жолым</p>
      <div class="song-file">oz-zholym.mp3</div>
    </div>

    <div class="song-card">
      <div class="song-number">TRACK 02</div>
      <p class="song-name">Zhaqyn Kelshi</p>
      <div class="song-file">zhaqyn-kelshi.mp3</div>
    </div>

    <div class="song-card">
      <div class="song-number">TRACK 03</div>
      <p class="song-name">Песня 3</p>
      <div class="song-file">pesnya3.mp3</div>
    </div>

    <div class="song-card">
      <div class="song-number">TRACK 04</div>
      <p class="song-name">Скоро релиз 4</p>
      <div class="song-file">будущий трек</div>
    </div>

    <div class="song-card">
      <div class="song-number">TRACK 05</div>
      <p class="song-name">Скоро релиз 5</p>
      <div class="song-file">будущий трек</div>
    </div>

    <div class="song-card">
      <div class="song-number">TRACK 06</div>
      <p class="song-name">Скоро релиз 6</p>
      <div class="song-file">будущий трек</div>
    </div>

    <a href="https://www.tiktok.com/@saenl1?_r=1&_t=ZS-95LGRMEpvrF" class="btn" target="_blank">TikTok ANSA</a>
  </div>

  <script>
    const tracks = [
      {
        title: "Өз жолым",
        file: "oz-zholym.mp3"
      },
      {
        title: "Zhaqyn Kelshi",
        file: "zhaqyn-kelshi.mp3"
      },
      {
        title: "Песня 3",
        file: "pesnya3.mp3"
      }
    ];

    let currentTrackIndex = 0;
    let shuffleMode = false;

    const audioPlayer = document.getElementById("audioPlayer");
    const audioSource = document.getElementById("audioSource");
    const trackTitle = document.getElementById("trackTitle");
    const shuffleStatus = document.getElementById("shuffleStatus");

    function loadTrack(index) {
      currentTrackIndex = index;
      audioSource.src = tracks[index].file;
      trackTitle.textContent = tracks[index].title;
      audioPlayer.load();
    }

    function playSelectedTrack(index) {
      loadTrack(index);
      audioPlayer.play();
    }

    function nextTrack() {
      if (shuffleMode) {
        let randomIndex;
        do {
          randomIndex = Math.floor(Math.random() * tracks.length);
        } while (tracks.length > 1 && randomIndex === currentTrackIndex);

        playSelectedTrack(randomIndex);
      } else {
        let nextIndex = currentTrackIndex + 1;

        if (nextIndex >= tracks.length) {
          nextIndex = 0;
        }

        playSelectedTrack(nextIndex);
      }
    }

    function prevTrack() {
      if (shuffleMode) {
        let randomIndex;
        do {
          randomIndex = Math.floor(Math.random() * tracks.length);
        } while (tracks.length > 1 && randomIndex === currentTrackIndex);

        playSelectedTrack(randomIndex);
      } else {
        let prevIndex = currentTrackIndex - 1;

        if (prevIndex < 0) {
          prevIndex = tracks.length - 1;
        }

        playSelectedTrack(prevIndex);
      }
    }

    function toggleShuffle() {
      shuffleMode = !shuffleMode;
      shuffleStatus.textContent = shuffleMode ? "Shuffle: ON" : "Shuffle: OFF";
    }

    audioPlayer.addEventListener("ended", function () {
      nextTrack();
    });
  </script>
</body>
</html>
