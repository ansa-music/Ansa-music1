<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ANSA • Digital Diary</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617 70%);
      color: white;
      text-align: center;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 430px;
      margin: auto;
      padding-top: 20px;
    }

    h1 {
      font-size: 34px;
      margin-bottom: 5px;
      color: #7dd3fc;
      text-shadow: 0 0 15px rgba(125, 211, 252, 0.5);
    }

    .subtitle {
      opacity: 0.75;
      margin-bottom: 25px;
      font-size: 14px;
    }

    .cover {
      width: 100%;
      border-radius: 24px;
      box-shadow: 0 0 30px rgba(56, 189, 248, 0.25);
      margin-bottom: 25px;
      border: 1px solid rgba(125, 211, 252, 0.15);
    }

    .song-card {
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(125, 211, 252, 0.15);
      border-radius: 20px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.08);
      backdrop-filter: blur(12px);
      transition: 0.3s ease;
    }

    .song-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 25px rgba(56, 189, 248, 0.18);
    }

    h2 {
      margin-top: 0;
      color: #e2e8f0;
    }

    p {
      color: #94a3b8;
      font-size: 14px;
    }

    audio {
      width: 100%;
      margin-top: 12px;
      filter: brightness(1.1);
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 14px 22px;
      border-radius: 14px;
      background: linear-gradient(90deg, #38bdf8, #0ea5e9);
      color: white;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 0 18px rgba(56, 189, 248, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ANSA</h1>
    <p class="subtitle">03:17 digital archive • dark sci-fi memories</p>

    <img src="oz-zholym-cover.jpg" alt="ANSA cover" class="cover">

    <div class="song-card">
      <h2>Өз жолым</h2>
      <audio controls>
        <source src="oz-zholym.mp3" type="audio/mpeg">
      </audio>
    </div>

    <div class="song-card">
      <h2>Песня 2</h2>
      <audio controls>
        <source src="pesnya2.mp3" type="audio/mpeg">
      </audio>
    </div>

    <div class="song-card">
      <h2>Песня 3</h2>
      <audio controls>
        <source src="pesnya3.mp3" type="audio/mpeg">
      </audio>
    </div>

    <div class="song-card">
      <h2>Скоро релиз 4</h2>
      <p>Новый сигнал из цифровой ночи скоро появится</p>
    </div>

    <div class="song-card">
      <h2>Скоро релиз 5</h2>
      <p>Архив памяти пополняется...</p>
    </div>

    <div class="song-card">
      <h2>Скоро релиз 6</h2>
      <p>Следующая история уже формируется</p>
    </div>

    <a href="https://www.tiktok.com/@saenl1?_r=1&_t=ZS-95LGRMEpvrF" class="btn" target="_blank">TikTok ANSA</a>
  </div>
</body>
</html>
